<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuantumConnect | Enterprise Communication</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #05050a;
            --surface: #0f111a;
            --surface-hover: #161a29;
            --border: rgba(255, 255, 255, 0.08);
            --accent: #5e5ce6;
            --accent-glow: rgba(94, 92, 230, 0.3);
            --text-main: #f5f5f7;
            --text-dim: #94a3b8;
            --success: #34c759;
            --danger: #ff453a;
            --glass: rgba(15, 17, 26, 0.7);
            --sidebar-width: 260px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            scrollbar-width: thin;
            scrollbar-color: var(--border) transparent;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        h1, h2, h3, .brand-name {
            font-family: 'Outfit', sans-serif;
        }

        /* --- AUTH SCREEN --- */
        #auth-screen {
            position: fixed;
            inset: 0;
            z-index: 1000;
            background: radial-gradient(circle at top right, #1a1a2e 0%, #05050a 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: opacity 0.5s ease-out;
        }

        .auth-card {
            width: 100%;
            max-width: 400px;
            padding: 40px;
            background: var(--glass);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 24px;
            box-shadow: 0 40px 100px rgba(0,0,0,0.8);
            text-align: center;
            animation: authIn 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes authIn {
            from { opacity: 0; transform: translateY(20px) scale(0.95); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        .auth-logo {
            width: 64px;
            height: 64px;
            background: linear-gradient(135deg, var(--accent), #af52de);
            border-radius: 16px;
            margin: 0 auto 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            box-shadow: 0 10px 30px var(--accent-glow);
        }

        .auth-title { font-size: 28px; font-weight: 700; margin-bottom: 8px; letter-spacing: -0.02em; }
        .auth-sub { font-size: 14px; color: var(--text-dim); margin-bottom: 32px; }

        .input-group { text-align: left; margin-bottom: 20px; }
        .input-group label { display: block; font-size: 12px; font-weight: 600; color: var(--text-dim); text-transform: uppercase; margin-bottom: 8px; }
        .input-group input {
            width: 100%;
            padding: 14px 16px;
            background: rgba(255,255,255,0.03);
            border: 1px solid var(--border);
            border-radius: 12px;
            color: white;
            font-size: 15px;
            outline: none;
            transition: all 0.2s;
        }
        .input-group input:focus { border-color: var(--accent); background: rgba(255,255,255,0.05); box-shadow: 0 0 0 4px var(--accent-glow); }

        .btn-auth {
            width: 100%;
            padding: 14px;
            background: var(--accent);
            border: none;
            border-radius: 12px;
            color: white;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 10px;
        }
        .btn-auth:hover { filter: brightness(1.1); transform: translateY(-1px); box-shadow: 0 10px 20px var(--accent-glow); }
        .btn-auth:active { transform: translateY(0); }

        /* --- MAIN LAYOUT --- */
        #main-app {
            display: grid;
            grid-template-columns: var(--sidebar-width) 1fr;
            height: 100vh;
            opacity: 0;
            transition: opacity 0.5s ease;
        }
        #main-app.visible { opacity: 1; }

        .sidebar {
            background: var(--surface);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            padding: 24px 0;
            z-index: 10;
        }

        .sidebar-header {
            padding: 0 24px 24px;
            display: flex;
            align-items: center;
            gap: 12px;
            font-weight: 700;
            font-size: 18px;
            border-bottom: 1px solid var(--border);
        }

        .sidebar-nav {
            flex: 1;
            overflow-y: auto;
            padding: 20px 12px;
        }

        .nav-label {
            font-size: 11px;
            font-weight: 700;
            color: var(--text-dim);
            text-transform: uppercase;
            padding: 0 12px 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 12px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            color: var(--text-dim);
            transition: 0.2s;
            margin-bottom: 4px;
        }
        .nav-item:hover { background: var(--surface-hover); color: white; }
        .nav-item.active { background: var(--accent-glow); color: var(--accent); border-left: 3px solid var(--accent); }
        .nav-item .icon { font-size: 16px; width: 20px; text-align: center; }

        .user-pill {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px;
            border-radius: 10px;
            transition: 0.2s;
        }
        .user-avatar {
            width: 32px;
            height: 32px;
            border-radius: 10px;
            background: var(--border);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 12px;
            color: white;
            flex-shrink: 0;
        }
        .user-status {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--success);
            box-shadow: 0 0 10px var(--success);
        }
        .user-info { flex: 1; min-width: 0; }
        .user-name { font-size: 13px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        .chat-container {
            display: flex;
            flex-direction: column;
            background: #000;
            position: relative;
            min-height: 0;
            overflow: hidden;
        }

        .chat-header {
            height: 64px;
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 24px;
        }

        .chat-title {
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 600;
        }

        .messages-area {
            flex: 1;
            overflow-y: auto;
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        /* --- MESSAGE STYLES --- */
        .msg-group {
            display: flex;
            gap: 12px;
            max-width: 80%;
            animation: msgIn 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }
        @keyframes msgIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .msg-own { align-self: flex-end; flex-direction: row-reverse; }
        .msg-avatar { width: 36px; height: 36px; border-radius: 12px; flex-shrink: 0; background: var(--surface-hover); display: flex; align-items: center; justify-content: center; font-weight: 700; }
        .msg-content-wrapper { display: flex; flex-direction: column; gap: 4px; }
        .msg-info { display: flex; align-items: center; gap: 8px; font-size: 11px; color: var(--text-dim); }
        .msg-bubble {
            padding: 12px 16px;
            border-radius: 16px;
            font-size: 14px;
            line-height: 1.5;
            background: var(--surface);
            border: 1px solid var(--border);
            color: var(--text-main);
            position: relative;
        }
        .msg-own .msg-bubble { background: var(--accent); border-color: transparent; color: white; border-bottom-right-radius: 2px; }
        .msg-not-own .msg-bubble { border-bottom-left-radius: 2px; }

        .input-area {
            padding: 24px;
            background: var(--surface);
            border-top: 1px solid var(--border);
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .input-wrapper {
            flex: 1;
            background: rgba(255,255,255,0.03);
            border: 1px solid var(--border);
            border-radius: 14px;
            display: flex;
            align-items: center;
            padding: 0 12px;
            transition: 0.2s;
        }
        .input-wrapper:focus-within { border-color: var(--accent); background: rgba(255,255,255,0.05); }

        #msg-input {
            flex: 1;
            background: transparent;
            border: none;
            padding: 14px 4px;
            color: white;
            font-size: 15px;
            outline: none;
        }

        .btn-action {
            background: transparent;
            border: none;
            color: var(--text-dim);
            font-size: 18px;
            cursor: pointer;
            width: 36px;
            height: 36px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.2s;
        }
        .btn-action:hover { color: white; background: var(--surface-hover); }
        .btn-send { background: var(--accent); color: white; }
        .btn-send:hover { transform: scale(1.05); background: var(--accent); }

        /* --- MEDIA QUERIES --- */
        @media (max-width: 768px) {
            #main-app { grid-template-columns: 1fr; }
            .sidebar { display: none; }
        }

        /* Support for Widget mode */
        body.widget-mode {
            background: transparent;
        }
        body.widget-mode .sidebar { display: none; }
        body.widget-mode #main-app { grid-template-columns: 1fr; border-radius: 20px; border: 1px solid var(--border); }
    </style>
</head>
<body>

    <!-- AUTH SCREEN -->
    <div id="auth-screen">
        <div class="auth-card">
            <div class="auth-logo">QC</div>
            <h1 class="auth-title">QuantumConnect</h1>
            <p class="auth-sub">Enterprise Distributed Communication</p>
            
            <div class="input-group">
                <label>Display Name</label>
                <input type="text" id="username-input" placeholder="e.g. Alex Rivera" maxlength="24">
            </div>
            <div class="input-group">
                <label>Server Node</label>
                <input type="text" id="server-input" placeholder="ws://localhost:8888">
            </div>
            
            <button class="btn-auth" onclick="connect()">Establish Connection</button>
            <div id="auth-error" style="color: var(--danger); font-size: 13px; margin-top: 16px; min-height: 20px;"></div>
        </div>
    </div>

    <!-- MAIN APP -->
    <div id="main-app">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="auth-logo" style="width: 32px; height: 32px; font-size: 14px; margin: 0;">QC</div>
                <span class="brand-name">QuantumConnect</span>
            </div>

            <nav class="sidebar-nav">
                <div class="nav-label">Workspace</div>
                <div class="nav-item active" onclick="switchGeneral()">
                    <span class="icon">#</span>
                    <span>General Channel</span>
                </div>
                <div class="nav-item">
                    <span class="icon">⚡</span>
                    <span>System Alerts</span>
                </div>

                <div class="nav-label" style="margin-top: 30px;">
                    Users
                    <span id="user-count-badge" style="font-size: 10px; background: var(--accent); color: white; padding: 2px 6px; border-radius: 10px;">0</span>
                </div>
                <div id="online-users-list">
                    <!-- Users injected here -->
                </div>
            </nav>

            <div style="padding: 16px; border-top: 1px solid var(--border);">
                <div class="user-pill">
                    <div id="my-avatar" class="user-avatar">?</div>
                    <div class="user-info">
                        <div id="my-name" class="user-name">Not Connected</div>
                        <div style="font-size: 11px; color: var(--text-dim);">Internal Node</div>
                    </div>
                    <div class="user-status"></div>
                </div>
            </div>
        </aside>

        <!-- Chat Main -->
        <main class="chat-container">
            <header class="chat-header">
                <div class="chat-title">
                    <span style="color: var(--text-dim);">#</span>
                    <span id="chat-title-text">General Channel</span>
                    <span class="user-status" id="connection-status" style="background: var(--danger); box-shadow: 0 0 10px var(--danger);"></span>
                </div>
                <div style="display: flex; gap: 8px;">
                    <button class="btn-action">🔒</button>
                    <button class="btn-action">⚙️</button>
                </div>
            </header>

            <div class="messages-area" id="messages-list">
                <!-- Messages injected here -->
                <div class="msg-group system" style="justify-content: center; font-size: 12px; color: var(--text-dim); font-style: italic;">
                    Waiting for data stream...
                </div>
            </div>

            <div class="input-area">
                <button class="btn-action" onclick="document.getElementById('file-input').click()">📎</button>
                <div class="input-wrapper">
                    <input type="text" id="msg-input" placeholder="Type a message to the team..." onkeydown="handleKey(event)">
                    <button class="btn-action" title="Emoji">😊</button>
                </div>
                <button class="btn-action btn-send" onclick="sendMessage()">➤</button>
                <input type="file" id="file-input" style="display:none" onchange="uploadFile(this)">
            </div>
        </main>
    </div>

    <script>
        let ws = null;
        let myId = null;
        let myName = "";
        let retryCount = 0;

        // Chat State
        let currentMode = "public"; // "public" or "private"
        let currentPrivateChatId = null;
        let currentPrivateUserName = "";
        let chatHistories = { "public": [] };

        // Auto-fill server based on URL (Secure WebSockets for HTTPS)
        const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
        document.getElementById('server-input').value = `${protocol}//${window.location.host}/ws`;

        // --- WIDGET & INTEGRATION LOGIC ---
        const urlParams = new URLSearchParams(window.location.search);
        const isWidget = urlParams.get('widget') === 'true';
        const autoUser = urlParams.get('user');
        const accentColor = urlParams.get('accent');

        if (isWidget) {
            document.body.classList.add('widget-mode');
            if (accentColor) document.documentElement.style.setProperty('--accent', accentColor);
        }

        if (autoUser) {
            document.getElementById('username-input').value = autoUser;
            // Short delay to ensure socket is ready
            setTimeout(connect, 500);
        }

        // Listen for parent messages
        window.addEventListener('message', (event) => {
            if (event.data.type === 'SEND_MSG' && event.data.text) {
                document.getElementById('msg-input').value = event.data.text;
                sendMessage();
            }
        });

        function connect() {
            const nameInput = document.getElementById('username-input');
            const serverInput = document.getElementById('server-input');
            const errorEl = document.getElementById('auth-error');

            if (!nameInput.value.trim()) {
                errorEl.textContent = "Please enter a valid display name.";
                return;
            }

            errorEl.textContent = "";
            const btn = document.querySelector('.btn-auth');
            if (btn) {
                btn.textContent = "Connecting...";
                btn.disabled = true;
            }

            try {
                // Enterprise auto-pathing: if user didn't specify /ws, add it
                let url = serverInput.value;
                if (!url.endsWith('/ws')) url += '/ws';
                ws = new WebSocket(url);
            } catch (e) {
                if (errorEl) errorEl.textContent = "Connection Error: Check server path.";
                if (btn) resetAuthBtn();
                return;
            }

            ws.onopen = () => {
                ws.send(JSON.stringify({
                    type: "register",
                    username: nameInput.value.trim(),
                    user_id: "user_" + Math.random().toString(36).substr(2, 9)
                }));
            };

            ws.onmessage = (e) => {
                const data = JSON.parse(e.data);
                handleProtocol(data);
            };

            ws.onclose = () => {
                document.getElementById('connection-status').style.background = 'var(--danger)';
                appendSystemMessage("⚠️ Connection to node lost.");
            };
        }

        function handleProtocol(data) {
            switch(data.type) {
                case "welcome":
                    myId = data.user_id;
                    myName = data.username;
                    if (data.history) {
                        chatHistories["public"] = data.history;
                        renderCurrentChat();
                        appendSystemMessage("--- Message Archive Synchronized ---");
                    }
                    enterApp();
                    break;
                case "public_message":
                    chatHistories["public"].push(data);
                    if (currentMode === "public") appendMessage(data);
                    else appendSystemMessage(`New message in General Channel from ${data.sender}`);
                    break;
                case "private_message":
                    const pid = data.chat_id;
                    if (!chatHistories[pid]) chatHistories[pid] = [];
                    chatHistories[pid].push(data);
                    if (currentMode === "private" && currentPrivateChatId === pid) appendMessage(data);
                    else appendSystemMessage(`New secure message from ${data.sender}`);
                    break;
                case "private_chat_start":
                    currentMode = "private";
                    currentPrivateChatId = data.chat_id;
                    currentPrivateUserName = data.other_user;
                    if (!chatHistories[data.chat_id]) chatHistories[data.chat_id] = [];
                    
                    document.getElementById('chat-title-text').textContent = "Secure Channel: " + currentPrivateUserName;
                    renderCurrentChat();
                    appendSystemMessage("--- Secure WebSocket Established with " + currentPrivateUserName + " ---");
                    break;
                case "user_list":
                    updateUserList(data.users);
                    break;
            }
        }

        function enterApp() {
            document.getElementById('auth-screen').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('auth-screen').style.display = 'none';
                document.getElementById('main-app').classList.add('visible');
                document.getElementById('my-name').textContent = myName;
                document.getElementById('my-avatar').textContent = myName.charAt(0).toUpperCase();
                document.getElementById('connection-status').style.background = 'var(--success)';
                document.getElementById('connection-status').style.boxShadow = '0 0 10px var(--success)';
            }, 500);
        }

        function handleKey(e) {
            if (e.key === 'Enter') sendMessage();
        }

        function sendMessage() {
            const input = document.getElementById('msg-input');
            if (!input.value.trim()) return;

            if (currentMode === "public") {
                ws.send(JSON.stringify({ type: "public_message", content: input.value.trim() }));
            } else {
                ws.send(JSON.stringify({ type: "private_message", chat_id: currentPrivateChatId, content: input.value.trim() }));
            }
            input.value = "";
        }

        function switchGeneral() {
            currentMode = "public";
            currentPrivateChatId = null;
            document.getElementById('chat-title-text').textContent = "General Channel";
            renderCurrentChat();
            appendSystemMessage("--- Switched to General Channel ---");
        }

        function startPrivateChat(username) {
            if (username === myName) return;
            ws.send(JSON.stringify({ type: "private_request", recipient: username }));
            appendSystemMessage(`Requesting handshake with ${username}...`);
        }

        function renderCurrentChat() {
            const list = document.getElementById('messages-list');
            list.innerHTML = "";
            const targetId = currentMode === "public" ? "public" : currentPrivateChatId;
            const history = chatHistories[targetId] || [];
            history.forEach(m => appendMessage(m));
        }

        function appendMessage(data, isOwn = false) {
            const list = document.getElementById('messages-list');
            const self = isOwn || data.sender_id === myId;
            
            const time = data.timestamp ? new Date(data.timestamp).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}) : "Now";

            const div = document.createElement('div');
            div.className = `msg-group ${self ? 'msg-own' : 'msg-not-own'}`;
            div.innerHTML = `
                <div class="msg-avatar" style="background: ${getHSL(data.sender)}">${data.sender.charAt(0).toUpperCase()}</div>
                <div class="msg-content-wrapper">
                    <div class="msg-info">
                        <span style="font-weight: 700; color: ${self ? 'var(--accent)' : 'var(--text-main)'}">${data.sender}</span>
                        <span>${time}</span>
                    </div>
                    <div class="msg-bubble">${parseContent(data.content)}</div>
                </div>
            `;
            list.appendChild(div);
            list.scrollTop = list.scrollHeight;
        }

        function getHSL(name) {
            let hash = 0;
            for (let i = 0; i < name.length; i++) {
                hash = name.charCodeAt(i) + ((hash << 5) - hash);
            }
            return `hsl(${hash % 360}, 60%, 50%)`;
        }

        function parseContent(content) {
            if (!content) return "";
            if (content.startsWith('__FILE__')) {
                const parts = content.split('|_|');
                if (parts.length >= 4) {
                    const type = parts[0].replace('__FILE__', '');
                    const url = window.location.origin + '/' + parts[1].replace(/^\/+/, '');
                    const name = parts[2];
                    const caption = parts[3];

                    if (type === 'image') {
                        return `<div class="media-container" style="margin-top: 5px;">${caption ? `<p style="margin-bottom:8px">${caption}</p>` : ''}<img src="${url}" onload="const el = document.getElementById('messages-list'); el.scrollTop = el.scrollHeight;" style="max-width: 100%; max-height: 250px; border-radius: 12px; cursor: pointer; border: 1px solid var(--border);" onclick="window.open('${url}')"></div>`;
                    } else if (type === 'audio') {
                        return `<div class="media-container" style="margin-top: 5px;"><audio controls src="${url}" style="width: 220px; height: 32px;"></audio></div>`;
                    } else if (type === 'video') {
                        return `<div class="media-container" style="margin-top: 5px;"><video controls src="${url}" style="max-width: 100%; max-height: 250px; border-radius: 12px;"></video></div>`;
                    } else {
                        return `<a href="${url}" download="${name}" style="display: flex; align-items: center; gap: 10px; text-decoration: none; background: rgba(255,255,255,0.05); padding: 10px; border-radius: 10px; border: 1px solid var(--border); color: white; margin-top: 5px;"><span style="font-size: 24px;">📄</span><div style="display: flex; flex-direction: column; min-width: 0;"><span style="font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 150px;">${name}</span><span style="font-size: 10px; color: var(--text-dim);">Download File</span></div></a>`;
                    }
                }
            }
            return content.replace(/</g, "&lt;").replace(/>/g, "&gt;");
        }

        function appendSystemMessage(text) {
            const list = document.getElementById('messages-list');
            const div = document.createElement('div');
            div.className = "msg-group system";
            div.style.justifyContent = "center";
            div.style.fontSize = "12px";
            div.style.color = "var(--text-dim)";
            div.style.fontStyle = "italic";
            div.textContent = text;
            list.appendChild(div);
            list.scrollTop = list.scrollHeight;
        }

        function updateUserList(users) {
            const list = document.getElementById('online-users-list');
            document.getElementById('user-count-badge').textContent = users.length;
            list.innerHTML = "";
            users.forEach(u => {
                const div = document.createElement('div');
                div.className = "nav-item";
                div.onclick = () => startPrivateChat(u.username);
                div.innerHTML = `
                    <div class="user-avatar" style="width: 24px; height: 24px; font-size: 10px; background: ${getHSL(u.username)}">${u.username.charAt(0).toUpperCase()}</div>
                    <span style="font-size: 13px;">${u.username}</span>
                    ${u.user_id !== myId ? '<div class="user-status" style="margin-left: auto; width: 6px; height: 6px;"></div>' : ''}
                `;
                list.appendChild(div);
            });
        }

        async function uploadFile(input) {
            if (!input.files.length) return;
            const file = input.files[0];
            appendSystemMessage(`Uploading ${file.name}...`);
            
            try {
                const formData = new FormData();
                formData.append('file', file);
                const res = await fetch(`/upload?filename=${encodeURIComponent(file.name)}`, {
                    method: 'POST',
                    body: formData
                });
                if (!res.ok) throw new Error("Upload failed");
                const data = await res.json();
                
                // Properly detect type for UI rendering
                let typeStr = "file";
                if (file.type.startsWith("image/")) typeStr = "image";
                else if (file.type.startsWith("audio/")) typeStr = "audio";
                else if (file.type.startsWith("video/")) typeStr = "video";

                const encoded = `__FILE__${typeStr}|_|${data.url}|_|${data.name}|_|`;
                if (currentMode === "public") {
                    ws.send(JSON.stringify({ type: "public_message", content: encoded }));
                } else {
                    ws.send(JSON.stringify({ type: "private_message", chat_id: currentPrivateChatId, content: encoded }));
                }
            } catch (e) {
                appendSystemMessage("Upload failed.");
            }
        }
    </script>
</body>
